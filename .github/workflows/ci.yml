name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        zod: ["^3.22.0", "^4.0.0"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Set Zod version to ${{ matrix.zod }}
        run: pnpm add -w zod@${{ matrix.zod }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm -w -r build

      - name: Test core (vitest)
        run: pnpm --filter el-form-core test -- --run

      - name: Test react-hooks (runtime + tsd)
        run: pnpm --filter el-form-react-hooks test

      - name: Test el-form-react-components (vitest)
        run: pnpm --filter el-form-react-components exec vitest --environment jsdom --run

      - name: Test el-form-react (public API smoke)
        run: pnpm --filter el-form-react exec vitest --run

      - name: Type-check el-form-mcp
        run: pnpm --filter el-form-mcp type-check

      - name: Test el-form-mcp (vitest)
        run: pnpm --filter el-form-mcp test
