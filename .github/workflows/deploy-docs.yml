name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build el-form packages
        run: |
          cd packages/el-form-core && pnpm run build
          cd ../el-form-react-hooks && pnpm run build
          cd ../el-form-react-components && pnpm run build
          cd ../el-form-react && pnpm run build

      - name: Build docs
        working-directory: ./docs
        run: pnpm run build
        env:
          # Optional. Set a repo secret named GA_TRACKING_ID (a GA4
          # Measurement ID like G-XXXXXXXXXX) to enable analytics.
          # When the secret is unset this is empty and analytics stay off.
          GA_TRACKING_ID: ${{ secrets.GA_TRACKING_ID }}

      # Notify IndexNow (Bing, Yandex…) of the current URLs so changes are
      # picked up in minutes. Non-fatal: a failed ping never blocks the deploy.
      - name: Submit URLs to IndexNow
        working-directory: ./docs
        continue-on-error: true
        run: node scripts/indexnow-submit.mjs

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
